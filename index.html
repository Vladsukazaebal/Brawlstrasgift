<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZapechatonShop - тест</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #111;
            border: 1px solid #0f0;
            border-radius: 20px;
            padding: 30px;
            max-width: 1000px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #fff;
            text-shadow: 0 0 5px #0f0;
        }
        .auth {
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 20px;
        }
        .auth input, .auth button {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 8px;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .tab {
            background: #222;
            border: none;
            padding: 8px 16px;
            color: #0f0;
            cursor: pointer;
        }
        .tab.active {
            background: #0f0;
            color: #000;
        }
        .pane {
            display: none;
        }
        .pane.active {
            display: block;
        }
        .product {
            border: 1px solid #0f0;
            padding: 10px;
            margin: 10px;
            display: inline-block;
            width: 200px;
        }
        .cart {
            border-top: 1px solid #0f0;
            margin-top: 20px;
            padding-top: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #000;
            border: 1px solid #0f0;
            padding: 20px;
            width: 300px;
        }
        .close {
            float: right;
            cursor: pointer;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>ZapechatonShop</h1>
    <div id="authArea" class="auth">
        <h3>войти / зарегистрироваться</h3>
        <input type="text" id="authLogin" placeholder="логин">
        <input type="password" id="authPass" placeholder="пароль (мин 8)">
        <button id="authBtn">войти</button>
        <button id="regBtn">регистрация</button>
        <div id="authMsg" style="color:red"></div>
    </div>
    <div id="shopArea" style="display:none;">
        <div class="tabs">
            <button class="tab active" data-tab="pass">brawl pass</button>
            <button class="tab" data-tab="gems">гемы</button>
            <button class="tab" data-tab="skins">скины</button>
        </div>
        <div id="passPane" class="pane active"></div>
        <div id="gemsPane" class="pane"></div>
        <div id="skinsPane" class="pane"></div>
        <div class="cart">
            <h3>корзина</h3>
            <ul id="cartList"></ul>
            <div id="cartTotal">итого: 0</div>
            <button id="checkoutBtn">оформить</button>
        </div>
    </div>
</div>
<div id="paymentModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>данные карты</h3>
        <input type="text" id="cardNumber" placeholder="номер"><br>
        <input type="text" id="cardExp" placeholder="MM/YY"><br>
        <input type="text" id="cardCvv" placeholder="CVV"><br>
        <button id="payBtn">оплатить</button>
    </div>
</div>
<script>
    // имитация базы пользователей
    let users = [];
    let cart = [];
    let loggedUser = null;const products = {
        pass: [
            { name: "Brawl Pass 1", price: 349, old: 499 },
            { name: "Brawl Pass 2", price: 349, old: 499 },
            { name: "Brawl Pass 3", price: 349, old: 499 }
        ],
        gems: [
            { name: "80 гемов", price: 111, old: 159 },
            { name: "170 гемов", price: 223, old: 319 },
            { name: "360 гемов", price: 454, old: 649 },
            { name: "950 гемов", price: 1049, old: 1499 }
        ],
        skins: [
            { name: "Меха Леон", price: 279, old: 399 },
            { name: "Ковбой Кольт", price: 209, old: 299 },
            { name: "Рокер Мортис", price: 349, old: 499 },
            { name: "Бо Ультимативный", price: 489, old: 699 }
        ]
    };

    function renderProducts(category, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        let html = "";
        products[category].forEach(p => {
            html += <div class="product">
                <strong>${p.name}</strong><br>
                ${p.price} руб <s>${p.old} руб</s><br>
                <button onclick="addToCart('${p.name}', ${p.price})">купить</button>
            </div>;
        });
        container.innerHTML = html;
    }

    window.addToCart = function(name, price) {
        cart.push({name, price});
        updateCart();
    };

    function updateCart() {
        const list = document.getElementById("cartList");
        const totalSpan = document.getElementById("cartTotal");
        if (cart.length === 0) {
            list.innerHTML = "<li>пусто</li>";
            totalSpan.innerText = "итого: 0";
            return;
        }
        let total = 0;
        let html = "";
        cart.forEach((item, i) => {
            total += item.price;
            html += <li>${item.name} - ${item.price} <button onclick="removeFromCart(${i})">x</button></li>;
        });
        list.innerHTML = html;
        totalSpan.innerText = "итого: " + total;
    }

    window.removeFromCart = function(idx) {
        cart.splice(idx,1);
        updateCart();
    };

    // регистрация / логин
    const authBtn = document.getElementById("authBtn");
    const regBtn = document.getElementById("regBtn");
    const authLogin = document.getElementById("authLogin");
    const authPass = document.getElementById("authPass");
    const authMsg = document.getElementById("authMsg");

    regBtn.onclick = () => {
        const login = authLogin.value.trim();
        const pass = authPass.value.trim();
        if (!login || !pass) { authMsg.innerText = "заполните поля"; return; }
        if (pass.length < 8) { authMsg.innerText = "пароль минимум 8 символов"; return; }
        if (users.find(u => u.login === login)) { authMsg.innerText = "логин занят"; return; }
        users.push({ login, password: pass });
        authMsg.innerText = "регистрация успешна, теперь войдите";
    };

    authBtn.onclick = () => {
        const login = authLogin.value.trim();
        const pass = authPass.value.trim();
        const user = users.find(u => u.login === login && u.password === pass);
        if (!user) { authMsg.innerText = "неверный логин/пароль"; return; }
        loggedUser = login;
        document.getElementById("authArea").style.display = "none";
        document.getElementById("shopArea").style.display = "block";
        renderProducts("pass", "passPane");
        renderProducts("gems", "gemsPane");
        renderProducts("skins", "skinsPane");
    };

    // вкладки
    const tabs = document.querySelectorAll(".tab");
    const panes = {
        pass: document.getElementById("passPane"),
        gems: document.getElementById("gemsPane"),
        skins: document.getElementById("skinsPane")
    };
    tabs.forEach(tab => {tab.onclick = () => {
            const target = tab.getAttribute("data-tab");
            tabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            Object.values(panes).forEach(p => p.classList.remove("active"));
            if (panes[target]) panes[target].classList.add("active");
        };
    });

    // оплата (без вебхука, просто алерт)
    const modal = document.getElementById("paymentModal");
    const checkout = document.getElementById("checkoutBtn");
    const closeModal = document.querySelector(".close");
    const payConfirm = document.getElementById("payBtn");

    checkout.onclick = () => {
        if (cart.length === 0) { alert("корзина пуста"); return; }
        modal.style.display = "flex";
    };
    closeModal.onclick = () => modal.style.display = "none";
    window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };
    payConfirm.onclick = () => {
        const card = document.getElementById("cardNumber").value;
        const exp = document.getElementById("cardExp").value;
        const cvv = document.getElementById("cardCvv").value;
        if (!card  !exp  !cvv) { alert("заполните карту"); return; }
        alert("спасибо! (данные никуда не ушли, это тест)");
        cart = [];
        updateCart();
        modal.style.display = "none";
        document.getElementById("cardNumber").value = "";
        document.getElementById("cardExp").value = "";
        document.getElementById("cardCvv").value = "";
    };
</script>
</body>
</html>
